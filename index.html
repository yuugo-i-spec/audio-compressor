<script>
    window.onload = function() {
        const fileSelector = document.getElementById('fileSelector');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!fileSelector || !status || !downloadBtn) return;

        fileSelector.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerHTML = "⏳ ファイルを読み込み中...";
            downloadBtn.style.display = 'none';

            try {
                const arrayBuffer = await file.arrayBuffer();
                status.innerHTML = "⏳ 強制軽量化データを生成中...";
                
                const length = Math.floor(arrayBuffer.byteLength / 4) + 44; 
                const bufferArr = new ArrayBuffer(length);
                const view = new DataView(bufferArr);

                function setUint32(pos, data) { view.setUint32(pos, data, true); }
                function setUint16(pos, data) { view.setUint16(pos, data, true); }

                setUint32(0, 0x46464952);
                setUint32(4, length - 8);
                setUint32(8, 0x45564157);
                setUint32(12, 0x20746d66);
                setUint32(16, 16);
                setUint16(20, 1);
                setUint16(22, 1);
                setUint32(24, 8000);
                setUint32(28, 8000);
                setUint16(32, 1);
                setUint16(34, 8);
                setUint32(36, 0x61746164);
                setUint32(40, length - 44);

                const srcBytes = new Uint8Array(arrayBuffer);
                const destBytes = new Uint8Array(bufferArr, 44);
                for (let i = 0; i < destBytes.length; i++) {
                    destBytes[i] = srcBytes[i * 4] || 128;
                }

                const wavBlob = new Blob([bufferArr], { type: 'audio/wav' });
                const url = URL.createObjectURL(wavBlob);
                downloadBtn.href = url;
                downloadBtn.download = file.name.replace(/\.[^/.]+$/, "") + "_軽量化.wav";
                
                status.innerHTML = "✅ 軽量化が成功したわ！下のボタンから保存してね。";
                downloadBtn.style.display = 'inline-block';
            } catch (err) {
                status.innerHTML = "❌ 予期せぬエラーが発生したわ。";
                console.error(err);
            }
        });
    };
</script>
