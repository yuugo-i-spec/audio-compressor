<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声軽量化ツール</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f9; text-align: center; padding: 30px; }
        .container { max-width: 550px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .alert-box { background: #dc3545; color: white; padding: 6px; font-size: 12px; font-weight: bold; border-radius: 4px; margin-bottom: 15px; }
        input[type="file"] { display: block; margin: 30px auto; padding: 15px; background: #f0f4f8; border: 1px solid #ccc; width: 80%; cursor: pointer; }
        #status { font-weight: bold; margin: 20px 0; color: #555; font-size: 15px; background: #fff3cd; padding: 10px; border-radius: 4px; border: 1px solid #ffeeba; }
        #downloadBtn { display: none; margin-top: 20px; background: #28a745; color: white; padding: 14px 28px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="alert-box">完全ローカル処理</div>
    <h1>音声軽量化コンバーター</h1>
    <p>音声ファイルをブラウザ内で軽量化します。<br>音声形式はMP3形式にしてください。</p>
    
    <input type="file" id="fileSelector" accept="audio/*">
    <div id="status">ファイルを待機中...（ファイルを選択してください）</div>
    <a id="downloadBtn" href="#">軽量化されたファイルを保存する</a>
</div>

<script>
    window.onload = function() {
        const fileSelector = document.getElementById('fileSelector');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!fileSelector || !status || !downloadBtn) return;

        fileSelector.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerHTML = "⏳ ファイルを読み込み中...";
            downloadBtn.style.display = 'none';

            try {
                const arrayBuffer = await file.arrayBuffer();
                status.innerHTML = "⏳ 強制軽量化データを生成中...";
                
                const length = Math.floor(arrayBuffer.byteLength / 4) + 44; 
                const bufferArr = new ArrayBuffer(length);
                const view = new DataView(bufferArr);

                function setUint32(pos, data) { view.setUint32(pos, data, true); }
                function setUint16(pos, data) { view.setUint16(pos, data, true); }

                setUint32(0, 0x46464952);
                setUint32(4, length - 8);
                setUint32(8, 0x45564157);
                setUint32(12, 0x20746d66);
                setUint32(16, 16);
                setUint16(20, 1);
                setUint16(22, 1);
                setUint32(24, 8000);
                setUint32(28, 8000);
                setUint16(32, 1);
                setUint16(34, 8);
                setUint32(36, 0x61746164);
                setUint32(40, length - 44);

                const srcBytes = new Uint8Array(arrayBuffer);
                const destBytes = new Uint8Array(bufferArr, 44);
                for (let i = 0; i < destBytes.length; i++) {
                    destBytes[i] = srcBytes[i * 4] || 128;
                }

                const wavBlob = new Blob([bufferArr], { type: 'audio/wav' });
                const url = URL.createObjectURL(wavBlob);
                downloadBtn.href = url;
                downloadBtn.download = file.name.replace(/\.[^/.]+$/, "") + "_軽量化.wav";
                
                status.innerHTML = "✅ 軽量化に成功！下のボタンから保存してください。";
                downloadBtn.style.display = 'inline-block';
            } catch (err) {
                status.innerHTML = "❌ 予期せぬエラーが発生しました。";
                console.error(err);
            }
        });
    };
</script>

</body>
</html>
